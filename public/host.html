<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Host</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; overflow-x: hidden; }
  
  /* Lobby */
  #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  #lobby h1 { font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #lobby .subtitle { color: #aaa; font-size: 1.1rem; margin-bottom: 2rem; }
  .qr-box { background: #fff; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
  .qr-box img { width: 250px; height: 250px; }
  .join-url { color: #667eea; font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; }
  .player-count { font-size: 1.3rem; color: #ccc; margin-bottom: 1rem; }
  .player-list { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; max-width: 600px; margin-bottom: 2rem; }
  .player-chip { background: #1a1a3e; border: 1px solid #333; border-radius: 2rem; padding: 0.4rem 1rem; font-size: 0.9rem; }
  
  /* Setup */
  #setup { display: none; max-width: 700px; margin: 0 auto; padding: 2rem; }
  #setup h2 { font-size: 2rem; margin-bottom: 1.5rem; text-align: center; }
  .question-form { background: #1a1a3e; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
  .question-form label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #ccc; font-size: 0.9rem; }
  .question-form input, .question-form select { width: 100%; padding: 0.6rem; border-radius: 0.5rem; border: 1px solid #444; background: #0f0f23; color: #fff; font-size: 1rem; margin-bottom: 0.8rem; }
  .question-form .q-num { font-weight: 700; color: #667eea; font-size: 1.1rem; margin-bottom: 0.8rem; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  
  /* Buttons */
  .btn { padding: 0.8rem 2rem; border: none; border-radius: 0.7rem; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
  .btn:hover { transform: scale(1.05); }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-green { background: linear-gradient(135deg, #11998e, #38ef7d); color: #000; }
  .btn-orange { background: linear-gradient(135deg, #f7971e, #ffd200); color: #000; }
  .btn-red { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }
  .btn-small { padding: 0.5rem 1rem; font-size: 0.9rem; }
  .btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
  
  /* Question display */
  #questionView { display: none; min-height: 100vh; padding: 2rem; text-align: center; }
  .q-header { font-size: 1.2rem; color: #888; margin-bottom: 1rem; }
  .q-text { font-size: 2.2rem; font-weight: 700; margin-bottom: 2rem; line-height: 1.3; }
  .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 800px; margin: 0 auto 2rem; }
  .q-option { padding: 1.5rem; border-radius: 1rem; font-size: 1.3rem; font-weight: 600; text-align: center; }
  .q-option.opt-0 { background: #e21b3c; }
  .q-option.opt-1 { background: #1368ce; }
  .q-option.opt-2 { background: #d89e00; }
  .q-option.opt-3 { background: #26890c; }
  .q-option.correct { border: 4px solid #38ef7d; box-shadow: 0 0 20px rgba(56,239,125,0.5); }
  .q-option.wrong { opacity: 0.3; }
  .timer-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-bottom: 1rem; overflow: hidden; }
  .timer-fill { height: 100%; background: linear-gradient(90deg, #38ef7d, #667eea); transition: width 0.5s linear; border-radius: 4px; }
  .timer-text { font-size: 3rem; font-weight: 900; color: #667eea; margin-bottom: 1rem; }
  .answer-count { font-size: 1.1rem; color: #888; margin-top: 1rem; }
  
  /* Results */
  #resultsView { display: none; }
  .results-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 800px; margin: 0 auto 2rem; }
  .stat-bar { background: #1a1a3e; border-radius: 1rem; padding: 1rem; text-align: center; }
  .stat-bar .count { font-size: 2rem; font-weight: 700; }
  
  /* Leaderboard */
  #leaderboardView { display: none; min-height: 100vh; padding: 2rem; }
  .lb-title { text-align: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 2rem; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .lb-list { max-width: 600px; margin: 0 auto; }
  .lb-row { display: flex; align-items: center; padding: 1rem 1.5rem; margin-bottom: 0.5rem; border-radius: 1rem; background: #1a1a3e; animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
  .lb-rank { font-size: 1.5rem; font-weight: 900; width: 3rem; color: #667eea; }
  .lb-rank.gold { color: #ffd200; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name { flex: 1; font-size: 1.2rem; font-weight: 600; }
  .lb-score { font-size: 1.3rem; font-weight: 700; color: #38ef7d; }
  .lb-time { font-size: 1rem; font-weight: 600; margin-right: 1rem; min-width: 80px; text-align: right; }
  .lb-time.time-correct { color: #38ef7d; }
  .lb-time.time-wrong { color: #e74c3c; }
  
  /* Podium */
  #podiumView { display: none; min-height: 100vh; padding: 2rem; text-align: center; }
  .podium-title { font-size: 3rem; font-weight: 900; margin-bottom: 3rem; background: linear-gradient(135deg, #ffd200, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 1rem; margin-bottom: 3rem; }
  .podium-place { text-align: center; border-radius: 1rem 1rem 0 0; padding: 1.5rem 2rem; min-width: 150px; }
  .podium-place.p1 { background: linear-gradient(180deg, #ffd200, #f7971e); height: 220px; order: 2; }
  .podium-place.p2 { background: linear-gradient(180deg, #c0c0c0, #888); height: 170px; order: 1; }
  .podium-place.p3 { background: linear-gradient(180deg, #cd7f32, #8b4513); height: 130px; order: 3; }
  .podium-emoji { font-size: 3rem; }
  .podium-name { font-size: 1.3rem; font-weight: 700; margin: 0.5rem 0; color: #000; }
  .podium-score { font-size: 1.1rem; font-weight: 600; color: rgba(0,0,0,0.6); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>Live Quiz</h1>
  <p class="subtitle">Teilnehmende verbinden sich per QR-Code oder Link</p>
  <div class="qr-box"><img id="qrImg" src="" alt="QR Code"></div>
  <div class="join-url" id="joinUrl"></div>
  <div class="player-count"><span id="playerCount">0</span> Teilnehmende</div>
  <div class="player-list" id="playerList"></div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="showSetup()">Fragen eingeben</button>
    <button class="btn btn-green" id="startBtn" onclick="startGame()" style="display:none">Quiz starten</button>
  </div>
</div>

<!-- SETUP -->
<div id="setup">
  <h2>Fragen eingeben</h2>
  <div style="text-align:center; margin-bottom:1rem;">
    <label style="color:#ccc;">Anzahl Fragen: <select id="qCount" onchange="buildForms()">
      <option>3</option><option>5</option><option>8</option><option>10</option><option selected>12</option><option>15</option><option>20</option>
    </select></label>
    <label style="color:#ccc; margin-left:1rem;">Sekunden pro Frage: <select id="qTimer">
      <option>10</option><option>15</option><option selected>20</option><option>30</option><option>45</option><option>60</option>
    </select></label>
  </div>
  <div id="questionForms"></div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="saveQuestions()">Fragen speichern</button>
    <button class="btn btn-orange" onclick="hideSetup()">Abbrechen</button>
  </div>
</div>

<!-- QUESTION -->
<div id="questionView">
  <div class="q-header" id="qHeader"></div>
  <div class="timer-text" id="timerText"></div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="q-text" id="qText"></div>
  <div class="q-options" id="qOptions"></div>
  <div class="answer-count" id="answerCount"></div>
</div>

<!-- RESULTS (overlays on questionView) -->
<div id="resultsView"></div>

<!-- LEADERBOARD -->
<div id="leaderboardView">
  <div class="lb-title">Leaderboard</div>
  <div class="lb-list" id="lbList"></div>
  <div class="btn-row">
    <button class="btn btn-green" id="nextBtn" onclick="nextQuestion()">Weiter</button>
  </div>
</div>

<!-- PODIUM -->
<div id="podiumView">
  <div class="podium-title">Endergebnis</div>
  <div class="podium" id="podium"></div>
  <div class="lb-list" id="finalList" style="max-width:600px;margin:0 auto 2rem;"></div>
  <div class="btn-row">
    <button class="btn btn-red" onclick="resetGame()">Neues Spiel</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentCorrect = -1;
let timerInterval = null;
let timerSeconds = 20;

socket.emit("hostJoin");

// Load QR
fetch("/api/qr").then(r=>r.json()).then(d=>{
  document.getElementById("qrImg").src = d.qr;
  document.getElementById("joinUrl").textContent = d.url;
});

socket.on("playerUpdate", (players) => {
  document.getElementById("playerCount").textContent = players.length;
  const list = document.getElementById("playerList");
  list.innerHTML = players.map(p => '<span class="player-chip">' + p.name + '</span>').join("");
});

socket.on("question", (data) => {
  currentCorrect = data.correct;
  timerSeconds = data.timer;
  hideAll();
  const qv = document.getElementById("questionView");
  qv.style.display = "block";
  document.getElementById("qHeader").textContent = "Frage " + (data.index+1) + " von " + data.total;
  document.getElementById("qText").textContent = data.text;
  document.getElementById("answerCount").textContent = "0 / ? Antworten";
  
  const opts = document.getElementById("qOptions");
  opts.innerHTML = data.options.map((o,i) => '<div class="q-option opt-'+i+'">'+o+'</div>').join("");
  
  // Timer
  let remaining = timerSeconds;
  document.getElementById("timerText").textContent = remaining;
  document.getElementById("timerFill").style.width = "100%";
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    remaining--;
    document.getElementById("timerText").textContent = Math.max(0, remaining);
    document.getElementById("timerFill").style.width = (remaining/timerSeconds*100) + "%";
    if (remaining <= 0) clearInterval(timerInterval);
  }, 1000);
});

socket.on("answerCount", (data) => {
  document.getElementById("answerCount").textContent = data.count + " / " + data.total + " Antworten";
});

socket.on("results", (data) => {
  clearInterval(timerInterval);
  // Highlight correct/wrong
  const opts = document.querySelectorAll(".q-option");
  opts.forEach((el, i) => {
    if (i === data.correct) el.classList.add("correct");
    else el.classList.add("wrong");
  });
  // Show leaderboard button
  setTimeout(() => {
    socket.emit("showLeaderboard");
  }, 3000);
});

socket.on("leaderboard", (lb) => {
  hideAll();
  const view = document.getElementById("leaderboardView");
  view.style.display = "block";
  const list = document.getElementById("lbList");
  list.innerHTML = lb.slice(0, 10).map((p, i) => {
    let rankClass = i===0?"gold":i===1?"silver":i===2?"bronze":"";
    let timeInfo = "";
    if (p.lastTime !== null) {
      const timeClass = p.lastCorrect ? "time-correct" : "time-wrong";
      const icon = p.lastCorrect ? "\u2713" : "\u2717";
      timeInfo = '<div class="lb-time '+timeClass+'">'+icon+' '+p.lastTime.toFixed(1)+'s</div>';
    } else {
      timeInfo = '<div class="lb-time time-wrong">\u2014</div>';
    }
    return '<div class="lb-row" style="animation-delay:'+(i*0.1)+'s">' +
      '<div class="lb-rank '+rankClass+'">#'+(i+1)+'</div>' +
      '<div class="lb-name">'+p.name+'</div>' +
      timeInfo +
      '<div class="lb-score">'+p.score+' Pkt</div></div>';
  }).join("");
});

socket.on("podium", (lb) => {
  hideAll();
  const view = document.getElementById("podiumView");
  view.style.display = "block";
  
  const podium = document.getElementById("podium");
  const emojis = ["🥇", "🥈", "🥉"];
  podium.innerHTML = lb.slice(0, 3).map((p, i) => 
    '<div class="podium-place p'+(i+1)+'"><div class="podium-emoji">'+emojis[i]+'</div><div class="podium-name">'+p.name+'</div><div class="podium-score">'+p.score+' Punkte</div></div>'
  ).join("");
  
  const finalList = document.getElementById("finalList");
  finalList.innerHTML = lb.map((p, i) => {
    let rankClass = i===0?"gold":i===1?"silver":i===2?"bronze":"";
    return '<div class="lb-row"><div class="lb-rank '+rankClass+'">#'+(i+1)+'</div><div class="lb-name">'+p.name+'</div><div class="lb-score">'+p.score+' Pkt</div></div>';
  }).join("");
});

function hideAll() {
  ["lobby","setup","questionView","leaderboardView","podiumView"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
}

function showSetup() {
  document.getElementById("setup").style.display = "block";
  buildForms();
}

function hideSetup() {
  document.getElementById("setup").style.display = "none";
}

function buildForms() {
  const n = parseInt(document.getElementById("qCount").value);
  const container = document.getElementById("questionForms");
  container.innerHTML = "";
  for (let i = 0; i < n; i++) {
    container.innerHTML += '<div class="question-form">' +
      '<div class="q-num">Frage ' + (i+1) + '</div>' +
      '<label>Fragetext</label><input type="text" id="qt_'+i+'" placeholder="z.B. Was ist die Hauptstadt von Frankreich?">' +
      '<label>Antwortoptionen</label><div class="options-grid">' +
      '<input type="text" id="qo_'+i+'_0" placeholder="Option A">' +
      '<input type="text" id="qo_'+i+'_1" placeholder="Option B">' +
      '<input type="text" id="qo_'+i+'_2" placeholder="Option C">' +
      '<input type="text" id="qo_'+i+'_3" placeholder="Option D"></div>' +
      '<label>Richtige Antwort</label><select id="qc_'+i+'">' +
      '<option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></div>';
  }
}

function saveQuestions() {
  const n = parseInt(document.getElementById("qCount").value);
  const timer = parseInt(document.getElementById("qTimer").value);
  const questions = [];
  for (let i = 0; i < n; i++) {
    const text = document.getElementById("qt_"+i).value.trim();
    const options = [
      document.getElementById("qo_"+i+"_0").value.trim(),
      document.getElementById("qo_"+i+"_1").value.trim(),
      document.getElementById("qo_"+i+"_2").value.trim(),
      document.getElementById("qo_"+i+"_3").value.trim()
    ];
    const correct = parseInt(document.getElementById("qc_"+i).value);
    if (!text || options.some(o => !o)) {
      alert("Bitte alle Felder bei Frage " + (i+1) + " ausfuellen!");
      return;
    }
    questions.push({ text, options, correct });
  }
  
  fetch("/api/questions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ questions, timerSeconds: timer })
  }).then(r => r.json()).then(d => {
    alert(d.count + " Fragen gespeichert!");
    hideSetup();
    document.getElementById("startBtn").style.display = "inline-block";
  });
}

function startGame() {
  nextQuestion();
}

function nextQuestion() {
  socket.emit("nextQuestion");
}

function resetGame() {
  socket.emit("resetGame");
  hideAll();
  document.getElementById("lobby").style.display = "flex";
  document.getElementById("startBtn").style.display = "none";
}
</script>
</body>
</html>
